name: Screenshot Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  screenshot-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify screenshot baselines
        env:
          SMART_HOME_BASE_URL: "http://localhost"
        run: ./gradlew :androidApp:verifyRoborazziDebug --info

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-test-report
          path: |
            androidApp/build/reports/tests/testDebugUnitTest/
            androidApp/build/outputs/roborazzi/
